services:
  postgres:
    image: postgres:16.3
    network_mode: host
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-unimed_pacientes}
      POSTGRES_USER: ${POSTGRES_USER:-unimed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-unimed}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unimed} -d ${POSTGRES_DB:-unimed_pacientes}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  mysql:
    image: mysql:8.4
    network_mode: host
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-unimed_operacional}
      MYSQL_USER: ${MYSQL_USER:-unimed}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-unimed}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_TCP_PORT: ${MYSQL_TCP_PORT:-3307}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -P${MYSQL_TCP_PORT:-3307} -u${MYSQL_USER:-unimed} -p${MYSQL_PASSWORD:-unimed} ${MYSQL_DATABASE:-unimed_operacional} -e 'SELECT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${POSTGRES_DB:-unimed_pacientes}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-unimed}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-unimed}
      MYSQL_URL: jdbc:mysql://localhost:${MYSQL_TCP_PORT:-3307}/${MYSQL_DATABASE:-unimed_operacional}
      MYSQL_USER: ${MYSQL_USER:-unimed}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-unimed}
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    network_mode: host
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  postgres_data:
  mysql_data:
