spring.application.name=unimed-test
spring.mvc.problemdetails.enabled=true
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.date-time=iso
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.adjust-dates-to-context-time-zone=false
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/unimed_pacientes}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:unimed}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:unimed}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
